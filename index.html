<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=5.0" />
<meta name="theme-color" content="#0f172a" media="(prefers-color-scheme: dark)" />
<meta name="theme-color" content="#6366f1" media="(prefers-color-scheme: light)" />
<title>Morning Routine</title>
<link rel="manifest" href="manifest.json" />
<link rel="apple-touch-icon" href="icon-192.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Routine" />
<style>
  :root {
    --bg: #f1f5f9;
    --bg-elev: #ffffff;
    --bg-elev2: #f8fafc;
    --text: #0f172a;
    --text-dim: #64748b;
    --border: #e2e8f0;
    --accent: #6366f1;
    --accent-text: #ffffff;
    --shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.04);
    --shadow-lg: 0 10px 30px rgba(0,0,0,.15);
    --radius: 14px;
    --radius-sm: 10px;
    --done: #94a3b8;
    --danger: #ef4444;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0b1120;
      --bg-elev: #131c31;
      --bg-elev2: #1c273f;
      --text: #e8edf6;
      --text-dim: #94a3b8;
      --border: #243049;
      --accent: #818cf8;
      --accent-text: #0b1120;
      --shadow: 0 1px 3px rgba(0,0,0,.4);
      --shadow-lg: 0 10px 40px rgba(0,0,0,.6);
      --done: #475569;
    }
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.4;
    -webkit-font-smoothing: antialiased;
    padding-bottom: calc(var(--safe-bottom) + 12px);
  }
  /* Header */
  header {
    position: sticky; top: 0; z-index: 30;
    background: var(--accent);
    color: var(--accent-text);
    padding: calc(var(--safe-top) + 12px) 16px 12px;
    box-shadow: var(--shadow);
  }
  .head-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
  .head-title { font-size: 18px; font-weight: 700; letter-spacing: -.3px; display: flex; align-items: center; gap: 8px; }
  .head-title .emoji { font-size: 22px; }
  .icon-btn {
    background: rgba(255,255,255,.18); color: var(--accent-text);
    border: none; border-radius: 10px;
    min-width: 44px; min-height: 44px; padding: 0 10px;
    font-size: 18px; cursor: pointer; display: inline-flex; align-items: center; justify-content: center;
  }
  .icon-btn:active { background: rgba(255,255,255,.32); }

  /* Toolbar */
  .toolbar {
    display: flex; align-items: center; gap: 8px; margin-top: 10px; flex-wrap: wrap;
  }
  .toolbar .grow { flex: 1; }
  .nav-row { display: flex; align-items: center; gap: 8px; width: 100%; }
  .week-label { flex: 1; text-align: center; font-weight: 600; font-size: 14px; }
  .nav-btn {
    background: rgba(255,255,255,.18); color: var(--accent-text);
    border: none; border-radius: 10px; min-height: 40px; min-width: 44px;
    padding: 0 12px; font-size: 14px; font-weight: 600; cursor: pointer;
  }
  .nav-btn:active { background: rgba(255,255,255,.32); }
  .nav-btn[disabled] { opacity: .4; }
  .seg {
    display: inline-flex; background: rgba(255,255,255,.16); border-radius: 10px; padding: 3px;
  }
  .seg button {
    border: none; background: transparent; color: var(--accent-text);
    padding: 7px 12px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; min-height: 34px;
  }
  .seg button.active { background: var(--accent-text); color: var(--accent); }

  /* Main */
  main { padding: 14px 14px 30px; max-width: 760px; margin: 0 auto; }

  .week-block { margin-bottom: 22px; }
  .week-head {
    display: flex; align-items: baseline; gap: 8px; margin: 4px 2px 12px;
  }
  .week-head h2 { font-size: 16px; margin: 0; font-weight: 700; letter-spacing: -.2px; }
  .week-head .range { font-size: 13px; color: var(--text-dim); }

  .day-grid { display: grid; grid-template-columns: 1fr; gap: 12px; }
  @media (min-width: 720px) {
    .day-grid.compact { grid-template-columns: 1fr 1fr; }
  }

  .day-card {
    background: var(--bg-elev); border: 1px solid var(--border);
    border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden;
  }
  .day-card.today { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent); }
  .day-head {
    display: flex; align-items: center; justify-content: space-between; gap: 8px;
    padding: 12px 14px; background: var(--bg-elev2); border-bottom: 1px solid var(--border);
  }
  .day-name { font-weight: 700; font-size: 15px; }
  .day-date { font-size: 13px; color: var(--text-dim); font-weight: 500; }
  .day-badge {
    font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px;
    background: var(--accent); color: var(--accent-text); padding: 3px 8px; border-radius: 20px;
  }
  .day-progress { font-size: 12px; color: var(--text-dim); }

  .activities { list-style: none; margin: 0; padding: 6px; }
  .activity {
    display: flex; align-items: stretch; gap: 10px; padding: 8px; border-radius: var(--radius-sm);
    position: relative;
  }
  .activity:active { background: var(--bg-elev2); }
  .act-check {
    appearance: none; -webkit-appearance: none;
    min-width: 26px; width: 26px; height: 26px; margin: 4px 0 0; border-radius: 8px;
    border: 2px solid var(--border); background: var(--bg-elev); cursor: pointer; flex-shrink: 0;
    position: relative;
  }
  .act-check:checked { background: var(--accent); border-color: var(--accent); }
  .act-check:checked::after {
    content: ""; position: absolute; left: 8px; top: 3px; width: 6px; height: 12px;
    border: solid var(--accent-text); border-width: 0 3px 3px 0; transform: rotate(45deg);
  }
  .act-color { width: 5px; border-radius: 4px; flex-shrink: 0; }
  .act-body { flex: 1; min-width: 0; cursor: pointer; padding: 2px 0; }
  .act-name { font-weight: 600; font-size: 14.5px; }
  .act-meta { font-size: 12.5px; color: var(--text-dim); margin-top: 2px; display: flex; gap: 8px; flex-wrap: wrap; }
  .act-cat {
    font-size: 11px; font-weight: 600; padding: 1px 7px; border-radius: 12px;
    color: #fff;
  }
  .activity.done .act-name { text-decoration: line-through; color: var(--done); }
  .activity.done .act-meta { color: var(--done); }
  .act-edit { color: var(--text-dim); font-size: 16px; align-self: center; padding: 0 4px; }

  .add-act {
    display: block; width: calc(100% - 12px); margin: 2px 6px 8px;
    background: transparent; border: 1.5px dashed var(--border); color: var(--text-dim);
    border-radius: var(--radius-sm); padding: 10px; font-size: 13.5px; font-weight: 600; cursor: pointer; min-height: 44px;
  }
  .add-act:active { background: var(--bg-elev2); }

  /* Modal */
  .overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 100;
    display: flex; align-items: flex-end; justify-content: center; padding: 0;
    opacity: 0; pointer-events: none; transition: opacity .2s;
  }
  .overlay.open { opacity: 1; pointer-events: auto; }
  @media (min-width: 600px) { .overlay { align-items: center; padding: 20px; } }
  .sheet {
    background: var(--bg-elev); width: 100%; max-width: 480px;
    border-radius: 20px 20px 0 0; box-shadow: var(--shadow-lg);
    padding: 18px 18px calc(var(--safe-bottom) + 18px);
    transform: translateY(20px); transition: transform .2s; max-height: 92vh; overflow-y: auto;
  }
  @media (min-width: 600px) { .sheet { border-radius: 20px; } }
  .overlay.open .sheet { transform: translateY(0); }
  .sheet h3 { margin: 0 0 14px; font-size: 18px; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 13px; font-weight: 600; color: var(--text-dim); margin-bottom: 6px; }
  .field input, .field select {
    width: 100%; padding: 12px; font-size: 16px; border: 1px solid var(--border);
    border-radius: var(--radius-sm); background: var(--bg-elev2); color: var(--text);
    min-height: 48px;
  }
  .field-row { display: flex; gap: 10px; }
  .field-row .field { flex: 1; }
  .cat-picker { display: flex; flex-wrap: wrap; gap: 8px; }
  .cat-chip {
    border: 2px solid transparent; border-radius: 20px; padding: 8px 12px; font-size: 13px; font-weight: 600;
    color: #fff; cursor: pointer; min-height: 40px;
  }
  .cat-chip.sel { box-shadow: 0 0 0 3px var(--bg-elev), 0 0 0 5px currentColor; }
  .btn {
    width: 100%; padding: 14px; font-size: 15px; font-weight: 700; border: none;
    border-radius: var(--radius-sm); cursor: pointer; min-height: 50px; margin-top: 8px;
  }
  .btn-primary { background: var(--accent); color: var(--accent-text); }
  .btn-secondary { background: var(--bg-elev2); color: var(--text); border: 1px solid var(--border); }
  .btn-danger { background: transparent; color: var(--danger); }
  .btn-row { display: flex; gap: 10px; }
  .btn-row .btn { flex: 1; }
  .hint { font-size: 12px; color: var(--text-dim); margin: -2px 0 10px; }

  /* Menu sheet */
  .menu-item {
    display: flex; align-items: center; gap: 12px; width: 100%; text-align: left;
    background: transparent; border: none; border-bottom: 1px solid var(--border);
    padding: 16px 4px; font-size: 15px; color: var(--text); cursor: pointer; min-height: 56px;
  }
  .menu-item:last-child { border-bottom: none; }
  .menu-item .mi-ico { font-size: 20px; width: 28px; text-align: center; }
  .menu-item .mi-sub { font-size: 12px; color: var(--text-dim); }
  .menu-item.danger { color: var(--danger); }

  .toast {
    position: fixed; left: 50%; bottom: calc(var(--safe-bottom) + 24px); transform: translateX(-50%) translateY(20px);
    background: var(--text); color: var(--bg); padding: 12px 18px; border-radius: 24px;
    font-size: 14px; font-weight: 600; z-index: 200; opacity: 0; transition: all .25s; box-shadow: var(--shadow-lg);
    max-width: 90%; text-align: center;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .empty { text-align: center; color: var(--text-dim); padding: 24px; font-size: 14px; }
  input[type="file"] { display: none; }

  .install-banner {
    background: var(--bg-elev2); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 12px 14px; margin-bottom: 14px; font-size: 13px; color: var(--text-dim);
    display: flex; align-items: center; gap: 10px;
  }
  .install-banner b { color: var(--text); }
  .install-banner button { margin-left: auto; }
</style>
</head>
<body>
<header>
  <div class="head-row">
    <div class="head-title"><span class="emoji">🌅</span> Morning Routine</div>
    <button class="icon-btn" id="menuBtn" aria-label="Menu">⚙️</button>
  </div>
  <div class="toolbar">
    <div class="nav-row">
      <button class="nav-btn" id="prevBtn" aria-label="Previous week">‹</button>
      <div class="week-label" id="weekLabel">Week 1</div>
      <button class="nav-btn" id="nextBtn" aria-label="Next week">›</button>
    </div>
    <div class="nav-row" style="justify-content:center;">
      <div class="seg" id="viewSeg">
        <button data-view="week" class="active">Week</button>
        <button data-view="all">All 4 weeks</button>
      </div>
    </div>
  </div>
</header>

<main id="main"></main>

<!-- Activity edit sheet -->
<div class="overlay" id="editOverlay">
  <div class="sheet">
    <h3 id="editTitle">Edit activity</h3>
    <div class="field">
      <label for="fName">Activity name</label>
      <input type="text" id="fName" placeholder="e.g. Meditation" />
    </div>
    <div class="field-row">
      <div class="field">
        <label for="fStart">Start time</label>
        <input type="time" id="fStart" />
      </div>
      <div class="field">
        <label for="fDur">Duration (min)</label>
        <input type="number" id="fDur" min="1" max="600" step="1" />
      </div>
    </div>
    <div class="field">
      <label>Category</label>
      <div class="cat-picker" id="catPicker"></div>
    </div>
    <button class="btn btn-primary" id="saveDayBtn">Save (this day only)</button>
    <button class="btn btn-secondary" id="saveAllBtn">Apply to all <span id="weekdayName">days</span></button>
    <div class="btn-row">
      <button class="btn btn-secondary" id="dupBtn">Duplicate to…</button>
      <button class="btn btn-danger" id="deleteBtn">Delete</button>
    </div>
    <button class="btn btn-secondary" id="cancelEditBtn" style="margin-top:14px;">Cancel</button>
  </div>
</div>

<!-- Duplicate sheet -->
<div class="overlay" id="dupOverlay">
  <div class="sheet">
    <h3>Duplicate to days</h3>
    <p class="hint">Add a copy of this activity to the selected days (this 4-week period).</p>
    <div class="cat-picker" id="dupDays" style="flex-direction:column; gap:6px;"></div>
    <button class="btn btn-primary" id="dupConfirmBtn">Duplicate</button>
    <button class="btn btn-secondary" id="dupCancelBtn">Cancel</button>
  </div>
</div>

<!-- Menu sheet -->
<div class="overlay" id="menuOverlay">
  <div class="sheet">
    <h3>Settings & data</h3>
    <div class="field">
      <label for="startDateInput">Start date (Week 1 begins)</label>
      <input type="date" id="startDateInput" />
    </div>
    <button class="menu-item" id="todayBtn"><span class="mi-ico">📍</span><div><div>Jump to today</div><div class="mi-sub">Set Week 1 to start today</div></div></button>
    <button class="menu-item" id="exportBtn"><span class="mi-ico">⬇️</span><div><div>Export routine</div><div class="mi-sub">Download everything as JSON</div></div></button>
    <button class="menu-item" id="importBtn"><span class="mi-ico">⬆️</span><div><div>Import routine</div><div class="mi-sub">Load from a JSON file</div></div></button>
    <button class="menu-item danger" id="resetBtn"><span class="mi-ico">♻️</span><div><div>Reset to default</div><div class="mi-sub">Restore the default routine</div></div></button>
    <button class="btn btn-secondary" id="menuCloseBtn" style="margin-top:14px;">Close</button>
    <input type="file" id="importFile" accept="application/json,.json" />
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
(function () {
  "use strict";

  // ---------- Constants ----------
  var STORAGE_KEY = "morningRoutine.v1";
  var WEEKDAY_LONG = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
  var WEEKDAY_SHORT = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  var MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];

  var CATEGORIES = {
    wake:       { name: "Wake",       color: "#f59e0b" },
    movement:   { name: "Movement",   color: "#10b981" },
    mindfulness:{ name: "Mindfulness",color: "#8b5cf6" },
    planning:   { name: "Planning",   color: "#3b82f6" },
    meals:      { name: "Meals",      color: "#f97316" },
    exercise:   { name: "Exercise",   color: "#ef4444" },
    hygiene:    { name: "Hygiene",    color: "#06b6d4" }
  };

  // ---------- Date helpers ----------
  function pad(n){ return n < 10 ? "0"+n : ""+n; }
  function toKey(d){ return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate()); }
  function parseKey(s){ var p = s.split("-"); return new Date(+p[0], +p[1]-1, +p[2], 12, 0, 0, 0); }
  function todayKey(){ var d = new Date(); return toKey(d); }
  function addDays(d, n){ var x = new Date(d.getTime()); x.setDate(x.getDate()+n); return x; }
  function fmtDayDate(d){ return d.getDate() + " " + MONTHS[d.getMonth()]; }       // "16 June"
  function fmtShort(d){ return d.getDate() + " " + MONTHS[d.getMonth()].slice(0,3); } // "16 Jun"

  // ---------- Default routine ----------
  var nextId = 1;
  function aid(){ return "a" + (nextId++) + "_" + Math.floor(Math.random()*1e6).toString(36); }
  function act(name, start, dur, cat){ return { id: aid(), name: name, start: start, dur: dur, cat: cat }; }

  function defaultTemplates(){
    var light = function(){ return [
      act("Wake up & hydrate", "07:00", 5,  "wake"),
      act("Light movement/walk","07:05", 15, "movement"),
      act("Meditation",         "07:20", 12, "mindfulness"),
      act("Plan day",           "07:32", 15, "planning"),
      act("Breakfast & prep",   "07:47", 10, "meals")
    ]; };
    var tuesday = [
      act("Wake up & hydrate", "07:00", 5,  "wake"),
      act("Bodyweight strength","07:05", 35, "exercise"),
      act("Shower",            "07:40", 20, "hygiene"),
      act("Meditation",        "08:00", 8,  "mindfulness"),
      act("Plan + breakfast",  "08:08", 10, "planning")
    ];
    var thursday = [
      act("Wake up & hydrate", "07:00", 5,  "wake"),
      act("HIIT at home",      "07:05", 35, "exercise"),
      act("Shower",            "07:40", 20, "hygiene"),
      act("Meditation",        "08:00", 8,  "mindfulness"),
      act("Plan + breakfast",  "08:08", 10, "planning")
    ];
    // index by weekday number 0=Sun..6=Sat
    return {
      0: light(), // Sun
      1: light(), // Mon
      2: tuesday, // Tue
      3: light(), // Wed
      4: thursday,// Thu
      5: light(), // Fri
      6: light()  // Sat
    };
  }

  function defaultState(){
    return {
      version: 1,
      startDate: todayKey(),
      templates: defaultTemplates(),
      overrides: {},   // dateKey -> [activities]
      completed: {}    // dateKey -> { activityId: true }
    };
  }

  // ---------- State ----------
  var state = load();
  var currentWeek = 0;      // 0..3
  var viewMode = "week";    // "week" | "all"

  function load(){
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return defaultState();
      var s = JSON.parse(raw);
      if (!s || !s.templates) return defaultState();
      // keep nextId ahead of any saved ids
      var maxSeen = 0;
      var scan = function(arr){ (arr||[]).forEach(function(a){ var m=/^a(\d+)_/.exec(a.id||""); if(m) maxSeen=Math.max(maxSeen,+m[1]); }); };
      Object.keys(s.templates).forEach(function(k){ scan(s.templates[k]); });
      Object.keys(s.overrides||{}).forEach(function(k){ scan(s.overrides[k]); });
      nextId = maxSeen + 1;
      s.overrides = s.overrides || {};
      s.completed = s.completed || {};
      return s;
    } catch(e){ return defaultState(); }
  }

  function save(){
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
    catch(e){ toast("Could not save (storage full?)"); }
  }

  // Effective activities for a date (override if present, else weekday template), sorted by start time
  function activitiesFor(dateKey){
    var d = parseKey(dateKey);
    var list = state.overrides[dateKey] ? state.overrides[dateKey] : state.templates[d.getDay()];
    list = (list || []).slice();
    list.sort(function(a,b){ return (a.start||"").localeCompare(b.start||""); });
    return list;
  }

  function ensureOverride(dateKey){
    if (!state.overrides[dateKey]) {
      var d = parseKey(dateKey);
      // deep copy template, keep ids so cross-references stay consistent
      state.overrides[dateKey] = (state.templates[d.getDay()] || []).map(function(a){ return Object.assign({}, a); });
    }
    return state.overrides[dateKey];
  }

  // ---------- Time helpers ----------
  function addMinutes(hhmm, mins){
    var p = (hhmm||"00:00").split(":"); var t = (+p[0])*60 + (+p[1]) + mins;
    t = ((t % 1440) + 1440) % 1440;
    return pad(Math.floor(t/60)) + ":" + pad(t%60);
  }
  function fmtTime(hhmm){ return hhmm; } // 24h display; could localize

  // ---------- Rendering ----------
  var main = document.getElementById("main");

  function weekDates(weekIndex){
    var start = addDays(parseKey(state.startDate), weekIndex*7);
    var arr = [];
    for (var i=0;i<7;i++) arr.push(addDays(start, i));
    return arr;
  }

  function weekRangeLabel(weekIndex){
    var ds = weekDates(weekIndex);
    return fmtShort(ds[0]) + " – " + fmtShort(ds[6]);
  }

  function render(){
    main.innerHTML = "";
    document.getElementById("weekLabel").textContent = "Week " + (currentWeek+1);
    document.getElementById("prevBtn").disabled = (viewMode === "week" && currentWeek === 0);
    document.getElementById("nextBtn").disabled = (viewMode === "week" && currentWeek === 3);

    if (typeof window.__pwaInstall === "object" && window.__pwaInstall.show) renderInstallBanner();

    var weeks = viewMode === "all" ? [0,1,2,3] : [currentWeek];
    weeks.forEach(function(wi){ main.appendChild(renderWeek(wi, viewMode === "all")); });
  }

  function renderInstallBanner(){
    var b = document.createElement("div");
    b.className = "install-banner";
    b.innerHTML = "<span>📲</span><div><b>Install this app</b><br>Add it to your home screen.</div>";
    var btn = document.createElement("button");
    btn.className = "nav-btn"; btn.style.background = "var(--accent)"; btn.style.color = "var(--accent-text)";
    btn.textContent = "Install";
    btn.onclick = function(){ if (window.__pwaInstall.prompt) window.__pwaInstall.prompt(); };
    b.appendChild(btn);
    main.appendChild(b);
  }

  function renderWeek(weekIndex, compact){
    var block = document.createElement("div");
    block.className = "week-block";

    var ds = weekDates(weekIndex);
    var head = document.createElement("div");
    head.className = "week-head";
    head.innerHTML = "<h2>Week " + (weekIndex+1) + "</h2><span class='range'>" +
      fmtDayDate(ds[0]) + " – " + fmtDayDate(ds[6]) + "</span>";
    block.appendChild(head);

    var grid = document.createElement("div");
    grid.className = "day-grid" + (compact ? " compact" : "");
    ds.forEach(function(d){ grid.appendChild(renderDay(d)); });
    block.appendChild(grid);
    return block;
  }

  function renderDay(d){
    var key = toKey(d);
    var card = document.createElement("div");
    card.className = "day-card" + (key === todayKey() ? " today" : "");

    var acts = activitiesFor(key);
    var comp = state.completed[key] || {};
    var doneCount = acts.filter(function(a){ return comp[a.id]; }).length;
    var isOverride = !!state.overrides[key];

    var head = document.createElement("div");
    head.className = "day-head";
    var left = document.createElement("div");
    left.innerHTML = "<div class='day-name'>" + WEEKDAY_LONG[d.getDay()] +
      (key === todayKey() ? " <span class='day-badge'>Today</span>" : "") +
      "</div><div class='day-date'>" + fmtDayDate(d) + "</div>";
    var right = document.createElement("div");
    right.className = "day-progress";
    right.textContent = doneCount + "/" + acts.length + (isOverride ? " • custom" : "");
    head.appendChild(left); head.appendChild(right);
    card.appendChild(head);

    var ul = document.createElement("ul");
    ul.className = "activities";
    if (acts.length === 0) {
      var li = document.createElement("li"); li.className = "empty"; li.textContent = "No activities."; ul.appendChild(li);
    }
    acts.forEach(function(a){ ul.appendChild(renderActivity(key, a, comp)); });
    card.appendChild(ul);

    var addBtn = document.createElement("button");
    addBtn.className = "add-act";
    addBtn.textContent = "+ Add activity";
    addBtn.onclick = function(){ openEdit(key, null); };
    card.appendChild(addBtn);

    return card;
  }

  function renderActivity(dateKey, a, comp){
    var cat = CATEGORIES[a.cat] || { name: a.cat || "Other", color: "#94a3b8" };
    var li = document.createElement("li");
    li.className = "activity" + (comp[a.id] ? " done" : "");

    var chk = document.createElement("input");
    chk.type = "checkbox"; chk.className = "act-check"; chk.checked = !!comp[a.id];
    chk.setAttribute("aria-label", "Mark " + a.name + " done");
    chk.onchange = function(){
      var c = state.completed[dateKey] = state.completed[dateKey] || {};
      if (chk.checked) c[a.id] = true; else delete c[a.id];
      save();
      li.classList.toggle("done", chk.checked);
      // update the day progress counter
      render();
    };

    var color = document.createElement("div");
    color.className = "act-color"; color.style.background = cat.color;

    var body = document.createElement("div");
    body.className = "act-body";
    var end = addMinutes(a.start, a.dur);
    body.innerHTML = "<div class='act-name'>" + escapeHtml(a.name) + "</div>" +
      "<div class='act-meta'>" +
        "<span>🕐 " + fmtTime(a.start) + "–" + fmtTime(end) + "</span>" +
        "<span>⏱ " + a.dur + " min</span>" +
        "<span class='act-cat' style='background:" + cat.color + "'>" + cat.name + "</span>" +
      "</div>";
    body.onclick = function(){ openEdit(dateKey, a.id); };

    var edit = document.createElement("div");
    edit.className = "act-edit"; edit.textContent = "✎";
    edit.onclick = function(){ openEdit(dateKey, a.id); };

    li.appendChild(chk); li.appendChild(color); li.appendChild(body); li.appendChild(edit);
    return li;
  }

  function escapeHtml(s){ return (s||"").replace(/[&<>"']/g, function(c){
    return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]; }); }

  // ---------- Edit sheet ----------
  var editCtx = null; // { dateKey, activityId|null, cat }
  var editOverlay = document.getElementById("editOverlay");
  var catPicker = document.getElementById("catPicker");

  function buildCatPicker(selected){
    catPicker.innerHTML = "";
    Object.keys(CATEGORIES).forEach(function(k){
      var c = CATEGORIES[k];
      var chip = document.createElement("button");
      chip.type = "button";
      chip.className = "cat-chip" + (k === selected ? " sel" : "");
      chip.style.background = c.color; chip.style.color = "#fff";
      chip.textContent = c.name;
      chip.dataset.cat = k;
      chip.onclick = function(){
        editCtx.cat = k;
        Array.prototype.forEach.call(catPicker.children, function(ch){ ch.classList.remove("sel"); });
        chip.classList.add("sel");
      };
      catPicker.appendChild(chip);
    });
  }

  function openEdit(dateKey, activityId){
    var d = parseKey(dateKey);
    var existing = null;
    if (activityId) {
      existing = activitiesFor(dateKey).filter(function(a){ return a.id === activityId; })[0];
    }
    editCtx = { dateKey: dateKey, activityId: activityId, cat: existing ? existing.cat : "wake" };
    document.getElementById("editTitle").textContent = activityId ? "Edit activity" : "Add activity";
    document.getElementById("fName").value = existing ? existing.name : "";
    document.getElementById("fStart").value = existing ? existing.start : "07:00";
    document.getElementById("fDur").value = existing ? existing.dur : 10;
    document.getElementById("weekdayName").textContent = WEEKDAY_LONG[d.getDay()] + "s";
    buildCatPicker(editCtx.cat);
    document.getElementById("deleteBtn").style.display = activityId ? "" : "none";
    document.getElementById("dupBtn").style.display = activityId ? "" : "none";
    openOverlay(editOverlay);
  }

  function readForm(){
    var name = document.getElementById("fName").value.trim() || "Untitled";
    var start = document.getElementById("fStart").value || "07:00";
    var dur = Math.max(1, Math.min(600, parseInt(document.getElementById("fDur").value,10) || 10));
    return { name: name, start: start, dur: dur, cat: editCtx.cat };
  }

  // Save to this day only (creates/updates an override)
  document.getElementById("saveDayBtn").onclick = function(){
    var f = readForm();
    var list = ensureOverride(editCtx.dateKey);
    if (editCtx.activityId) {
      var item = list.filter(function(a){ return a.id === editCtx.activityId; })[0];
      if (item) { item.name=f.name; item.start=f.start; item.dur=f.dur; item.cat=f.cat; }
      else { list.push(Object.assign({id: aid()}, f)); }
    } else {
      list.push(Object.assign({id: aid()}, f));
    }
    save(); closeOverlay(editOverlay); render();
    toast("Saved for this day");
  };

  // Apply to all <weekday> — edits the weekday template and clears this date's override
  document.getElementById("saveAllBtn").onclick = function(){
    var f = readForm();
    var wd = parseKey(editCtx.dateKey).getDay();
    var list = state.templates[wd] = state.templates[wd] || [];
    if (editCtx.activityId) {
      var item = list.filter(function(a){ return a.id === editCtx.activityId; })[0];
      if (item) { item.name=f.name; item.start=f.start; item.dur=f.dur; item.cat=f.cat; }
      else { list.push(Object.assign({id: editCtx.activityId}, f)); }
    } else {
      list.push(Object.assign({id: aid()}, f));
    }
    // remove this date's override so the template change is visible here
    delete state.overrides[editCtx.dateKey];
    save(); closeOverlay(editOverlay); render();
    toast("Applied to all " + WEEKDAY_LONG[wd] + "s");
  };

  document.getElementById("deleteBtn").onclick = function(){
    if (!editCtx.activityId) return;
    if (!confirm("Delete this activity? Choose how below.")) {}
    // Delete from this day only by default
    var list = ensureOverride(editCtx.dateKey);
    state.overrides[editCtx.dateKey] = list.filter(function(a){ return a.id !== editCtx.activityId; });
    save(); closeOverlay(editOverlay); render();
    toast("Deleted for this day");
  };

  document.getElementById("cancelEditBtn").onclick = function(){ closeOverlay(editOverlay); };

  // ---------- Duplicate sheet ----------
  var dupOverlay = document.getElementById("dupOverlay");
  document.getElementById("dupBtn").onclick = function(){
    var src = activitiesFor(editCtx.dateKey).filter(function(a){ return a.id === editCtx.activityId; })[0];
    if (!src) return;
    var container = document.getElementById("dupDays");
    container.innerHTML = "";
    // list all 28 days as toggle rows
    var allDays = [];
    for (var w=0; w<4; w++) weekDates(w).forEach(function(d){ allDays.push(d); });
    allDays.forEach(function(d){
      var k = toKey(d);
      var row = document.createElement("label");
      row.style.cssText = "display:flex;align-items:center;gap:10px;padding:8px;border-radius:8px;background:var(--bg-elev2);cursor:pointer;font-size:14px;";
      var cb = document.createElement("input"); cb.type="checkbox"; cb.value=k; cb.style.cssText="width:22px;height:22px;";
      if (k === editCtx.dateKey) { cb.disabled = true; }
      var span = document.createElement("span");
      span.textContent = WEEKDAY_SHORT[d.getDay()] + " " + fmtDayDate(d) + (k===editCtx.dateKey?" (source)":"");
      row.appendChild(cb); row.appendChild(span);
      container.appendChild(row);
    });
    container._src = src;
    openOverlay(dupOverlay);
  };
  document.getElementById("dupCancelBtn").onclick = function(){ closeOverlay(dupOverlay); };
  document.getElementById("dupConfirmBtn").onclick = function(){
    var container = document.getElementById("dupDays");
    var src = container._src;
    var picks = Array.prototype.filter.call(container.querySelectorAll("input:checked"), function(cb){ return !cb.disabled; });
    if (picks.length === 0) { toast("Pick at least one day"); return; }
    picks.forEach(function(cb){
      var list = ensureOverride(cb.value);
      list.push(Object.assign({}, src, { id: aid() }));
    });
    save(); closeOverlay(dupOverlay); closeOverlay(editOverlay); render();
    toast("Duplicated to " + picks.length + " day" + (picks.length>1?"s":""));
  };

  // ---------- Menu / data ----------
  var menuOverlay = document.getElementById("menuOverlay");
  document.getElementById("menuBtn").onclick = function(){
    document.getElementById("startDateInput").value = state.startDate;
    openOverlay(menuOverlay);
  };
  document.getElementById("menuCloseBtn").onclick = function(){ closeOverlay(menuOverlay); };

  document.getElementById("startDateInput").onchange = function(e){
    if (e.target.value) { state.startDate = e.target.value; currentWeek = 0; save(); render(); toast("Start date updated"); }
  };
  document.getElementById("todayBtn").onclick = function(){
    state.startDate = todayKey(); currentWeek = 0;
    document.getElementById("startDateInput").value = state.startDate;
    save(); render(); toast("Week 1 starts today");
  };

  document.getElementById("exportBtn").onclick = function(){
    var data = JSON.stringify(state, null, 2);
    var blob = new Blob([data], { type: "application/json" });
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url; a.download = "morning-routine-" + todayKey() + ".json";
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
    toast("Exported JSON");
  };

  document.getElementById("importBtn").onclick = function(){ document.getElementById("importFile").click(); };
  document.getElementById("importFile").onchange = function(e){
    var file = e.target.files[0]; if (!file) return;
    var reader = new FileReader();
    reader.onload = function(){
      try {
        var s = JSON.parse(reader.result);
        if (!s.templates) throw new Error("Invalid file");
        state = s;
        state.overrides = state.overrides || {};
        state.completed = state.completed || {};
        currentWeek = 0;
        save(); closeOverlay(menuOverlay); render();
        toast("Routine imported");
      } catch(err){ toast("Import failed: invalid file"); }
    };
    reader.readAsText(file);
    e.target.value = "";
  };

  document.getElementById("resetBtn").onclick = function(){
    if (!confirm("Reset everything to the default routine? Your edits and checkmarks will be cleared.")) return;
    state = defaultState();
    currentWeek = 0;
    save(); closeOverlay(menuOverlay); render();
    toast("Reset to default");
  };

  // ---------- Navigation ----------
  document.getElementById("prevBtn").onclick = function(){ if (currentWeek>0){ currentWeek--; render(); window.scrollTo(0,0);} };
  document.getElementById("nextBtn").onclick = function(){ if (currentWeek<3){ currentWeek++; render(); window.scrollTo(0,0);} };
  document.getElementById("viewSeg").addEventListener("click", function(e){
    var btn = e.target.closest("button"); if (!btn) return;
    viewMode = btn.dataset.view;
    Array.prototype.forEach.call(this.children, function(b){ b.classList.toggle("active", b===btn); });
    render(); window.scrollTo(0,0);
  });

  // ---------- Overlay helpers ----------
  function openOverlay(ov){ ov.classList.add("open"); }
  function closeOverlay(ov){ ov.classList.remove("open"); }
  [editOverlay, dupOverlay, menuOverlay].forEach(function(ov){
    ov.addEventListener("click", function(e){ if (e.target === ov) closeOverlay(ov); });
  });

  // ---------- Toast ----------
  var toastEl = document.getElementById("toast"); var toastTimer;
  function toast(msg){
    toastEl.textContent = msg; toastEl.classList.add("show");
    clearTimeout(toastTimer); toastTimer = setTimeout(function(){ toastEl.classList.remove("show"); }, 1900);
  }

  // ---------- PWA: service worker + install prompt ----------
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", function(){
      navigator.serviceWorker.register("service-worker.js").catch(function(){});
    });
  }
  window.__pwaInstall = { show: false, prompt: null };
  window.addEventListener("beforeinstallprompt", function(e){
    e.preventDefault();
    window.__pwaInstall.show = true;
    window.__pwaInstall.prompt = function(){
      e.prompt(); e.userChoice.then(function(){ window.__pwaInstall.show=false; render(); });
    };
    render();
  });

  // ---------- Go ----------
  render();
})();
</script>
</body>
</html>
